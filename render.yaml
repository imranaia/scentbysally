services:
  - type: web
    name: scentbysally
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      # Set these in the Render dashboard (Environment tab) after the first
      # deploy - they're secrets, so they're intentionally left out of git.
      # TURSO_DATABASE_URL/TURSO_AUTH_TOKEN come from a free database at
      # https://turso.tech - required, since Render's Free plan has no
      # persistent disk for a local SQLite file to survive on.
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: SEED_SUPERADMIN_NAME
        sync: false
      - key: SEED_SUPERADMIN_EMAIL
        sync: false
      - key: SEED_SUPERADMIN_PASSWORD
        sync: false
